name: Monthly data refresh

# Re-fetches the OpenStreetMap dataset once a month, commits the updated
# GeoJSON, and lets Vercel's Git integration auto-deploy the new data.
on:
  schedule:
    - cron: "17 3 1 * *" # 03:17 UTC on the 1st of every month
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Fetch fresh data
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: node scripts/fetch-data.mjs
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: monthly OSM data refresh"
            git push
          fi
